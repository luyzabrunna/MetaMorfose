<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaMoforse - Criar Conta</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/cadastro.css">
</head>
<body>
    <div class="container">
        <!-- LADO ESQUERDO -->
        <div class="left">
            <div class="left-text">
                <h1 class="left-title">Vamos começar</h1>
                <p class="left-sub">Organize seus estudos com facilidade</p>
            </div>
            <div class="left-illustration">
                <img src="assets/img/ilustracao-cadastro.png" alt="Ilustração cadastro">
            </div>
        </div>
        <!-- LADO DIREITO -->
        <div class="right">
            <div class="form-box">
            <h2 class="form-title">Criar conta</h2>
            <p class="form-sub">Cadastre-se para começar</p>

            <form action="" method="POST">
                <div class="field">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="field">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="field">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required>
                </div>

                 <div class="field">
                    <label for="confirmar">Confirmar Senha</label>
                    <input type="password" id="confirmar" name="confirmar" required>
                 </div>

                <button type="submit" class="btn-criar">Criar Conta</button>
            </form>

            <p class="login-link">Já tem uma conta? <a href="login.html">Entrar</a></p>
        </div>
        </div>
    </div>
</body>
</html>
