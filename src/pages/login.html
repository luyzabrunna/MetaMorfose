<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaMorfose - Login</title>
    
    <!-- Pré-conexão para carregar as fontes mais rápido -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- Importação da fonte Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Arquivo de estilos externo -->
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>
    <!-- Container principal que divide a tela ao meio -->
    <div class="container">
        
        <!-- PAINEL ESQUERDO: Área do formulário -->
        <div class="left-panel">
            <h1>Login</h1>
            <p class="subtitle">Entre na sua conta</p>

            <!-- Formulário -->
            <form class="login-form" id="loginForm">
                
                <!-- Campo de E-mail -->
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
                </div>

                <!-- Campo de Senha COM toggle de visibilidade -->
                <div class="form-group">
                    <label for="senha">Senha</label>
                    
                    <!-- Container que posiciona o ícone -->
                    <div class="input-senha">
                        <input type="password" id="senha" name="senha" placeholder="••••••••" required autocomplete="current-password">
                        
                        <!-- Botão com ícones de olho (SVG) -->
                        <!--  CORREÇÃO: adicionado id="toggle-senha" e REMOVIDO o onclick -->
                        <button type="button" class="toggle-senha" id="toggle-senha" aria-label="Mostrar senha">
                            <!-- Ícone: olho aberto (visível por padrão) -->
                            <svg class="icone-olho" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <!-- Ícone: olho fechado (oculto por padrão) -->
                            <svg class="icone-olho-fechado oculto" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Botão de envio -->
                <button type="submit" class="btn-entrar">Entrar</button>
            </form>

            <!-- Link para cadastro (agora funcional, sem sublinhado) -->
            <p class="footer-link">Não tem conta? <a href="cadastro.html" class="link-cadastro">Cadastre-se</a></p>
        </div>

        <!-- PAINEL DIREITO: Área decorativa/ilustrativa -->
        <div class="right-panel">
            <!-- Formas geométricas animadas (puramente CSS) -->
            <div class="floating-shape shape-1"></div>
            <div class="floating-shape shape-2"></div>

            <div class="right-content">
                <h2>Bem-vindo(a)</h2>
                <p>Planeje suas metas e acompanhe seu progresso</p>

                <!-- Imagem ilustrativa -->
                <div class="illustration-container">
                    <img src="../assets/images/imagemlogin.png" alt="Ilustração de planejamento de metas">
                </div>
            </div>
        </div>
    </div>

    <!-- Script do toggle de senha -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggleBtn = document.getElementById('toggle-senha');
            const senhaInput = document.getElementById('senha');
            
            if (toggleBtn && senhaInput) {
                toggleBtn.addEventListener('click', function() {
                    const olhoAberto = this.querySelector('.icone-olho');
                    const olhoFechado = this.querySelector('.icone-olho-fechado');
                    
                    if (senhaInput.type === 'password') {
                        senhaInput.type = 'text';
                        olhoAberto?.classList.add('oculto');
                        olhoFechado?.classList.remove('oculto');
                        this.setAttribute('aria-label', 'Ocultar senha');
                    } else {
                        senhaInput.type = 'password';
                        olhoAberto?.classList.remove('oculto');
                        olhoFechado?.classList.add('oculto');
                        this.setAttribute('aria-label', 'Mostrar senha');
                    }
                });
            }
        });
    </script>
</body>
</html>
