<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Meta - MetaMorfose</title>

    <!-- Fontes e Ícones -->
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/400.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/500.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/600.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/700.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

     <!-- CSS Padronizado -->
     <link rel="stylesheet" href="../assets/css/criarmeta.css" />
</head>
<body>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="fecharMenu()"></div>

  <!-- TOPBAR MOBILE -->
  <div class="topbar-mobile">
    <button class="btn-hamburguer" id="btnHamburguer" onclick="abrirMenu()">
      <i class="fa-solid fa-bars"></i>
    </button>
  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="../assets/images/logo.1.png" alt="MetaMorfose" class="logo-img" />
      <button class="btn-fechar-menu" onclick="fecharMenu()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="sidebar-criar">
      <span>Criar<br>nova meta</span>
      <button class="btn-plus"><i class="fa-solid fa-plus"></i></button>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item">
        <i class="fa-solid fa-table-cells-large"></i>
        <span>Dashboard</span>
      </a>
      <a href="#" class="nav-item">
        <i class="fa-regular fa-circle-dot"></i>
        <span>Metas</span>
      </a>
      <a href="#" class="nav-item">
        <i class="fa-regular fa-clock"></i>
        <span>Sessões</span>
      </a>
      <a href="#" class="nav-item">
        <i class="fa-solid fa-chart-line"></i>
        <span>Progresso</span>
      </a>
    </nav>

    <a href="#" class="sidebar-sair">
      <i class="fa-solid fa-location-pin"></i>
      <span>Sair</span>
    </a>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- BANNER -->
    <div class="banner">
      <div class="banner-text">
        <h1>Nova meta</h1>
        <p>Dê o primeiro passo</p>
      </div>
      <div class="banner-illustration">
        <img src="../assets/images/imagemmeta.png" alt="Ilustração" />
      </div>
    </div>

    <!-- FORM CARD -->
    <div class="form-card">
      <h2 class="form-title">Criar nova meta</h2>

      <form>
        <div class="form-group">
          <label for="titulo">Título</label>
          <input type="text" id="titulo" name="titulo" />
        </div>

        <div class="form-group">
          <label for="descricao">Descrição</label>
          <textarea id="descricao" name="descricao"></textarea>
        </div>

        <div class="form-group">
          <label for="horas">Horas totais</label>
          <input type="number" id="horas" name="horas" />
        </div>

        <div class="form-group">
          <label for="prazo">Prazo</label>
          <input type="date" id="prazo" name="prazo" placeholder="Selecionar data" />
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-criar">CRIAR META</button>
          <button type="button" class="btn-cancelar">CANCELAR</button>
        </div>
      </form>
    </div>

  </main>

  <script>
    function abrirMenu() {
      document.getElementById('sidebar').classList.add('aberto');
      document.getElementById('overlay').classList.add('ativo');
    }
    function fecharMenu() {
      document.getElementById('sidebar').classList.remove('aberto');
      document.getElementById('overlay').classList.remove('ativo');
    }
  </script>

</body>
</html>
