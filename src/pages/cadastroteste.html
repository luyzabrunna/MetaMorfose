<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Crie sua conta e organize seus estudos com facilidade">
    
    <title>Criar conta</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/cadastroteste.css">
</head>

<body>
    <main class="container">

        <!-- LADO ESQUERDO -->
        <section class="lado-esquerdo">

            <div class="conteudo-esquerdo">
                <h1>Vamos começar</h1>
                <p>Organize seus estudos com facilidade</p>
            </div>

            <!-- IMAGEM (agora você controla aqui) -->
            <div class="ilustracao">
                <img src="sua-imagem.png" alt="Ilustração de estudos">
            </div>

        </section>

        <!-- LADO DIREITO -->
        <section class="lado-direito">

            <div class="conteudo-direito">

                <header>
                    <h1>Criar conta</h1>
                    <p class="subtitulo">Cadastre-se para começar</p>
                </header>

                <form>

                    <div class="grupo-formulario">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" placeholder="Seu nome completo" required>
                    </div>

                    <div class="grupo-formulario">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>

                    <!-- SENHA -->
                    <div class="grupo-formulario">
                        <label for="senha">Senha</label>

                        <div class="input-senha">
                            <input type="password" id="senha" placeholder="••••••••" required>
                            <span class="toggle-senha" onclick="toggleSenha('senha', this)">👁️</span>
                        </div>
                    </div>

                    <!-- CONFIRMAR -->
                    <div class="grupo-formulario">
                        <label for="confirmar">Confirmar senha</label>

                        <div class="input-senha">
                            <input type="password" id="confirmar" placeholder="••••••••" required>
                            <span class="toggle-senha" onclick="toggleSenha('confirmar', this)">👁️</span>
                        </div>
                    </div>

                    <button type="submit" class="botao-enviar">
                        Criar conta
                    </button>

                </form>

                <p class="link-login">
                    Já tem uma conta? <a href="#">Entrar</a>
                </p>

            </div>

        </section>

    </main>

    <script>
        function toggleSenha(id, elemento) {
            const input = document.getElementById(id);

            if (input.type === "password") {
                input.type = "text";
                elemento.textContent = "🙈";
            } else {
                input.type = "password";
                elemento.textContent = "👁️";
            }
        }
    </script>

</body>
</html>
